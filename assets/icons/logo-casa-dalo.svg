  <path class="gold-fill" d="M210 374 L211.8 378.5 L216.5 380 L211.8 381.5 L210 386 L208.2 381.5 L203.5 380 L208.2 378.5 Z"/>

  <text class="tagline" x="210" y="412" font-size="12.5" text-anchor="middle">Libros artesanales para quienes leen con el corazón.</text>

  <!-- Small botanical ornament at bottom -->
  <g class="gold" stroke-width="1.1">
    <path d="M210 424 C210 430 210 436 210 440"/>
    <path d="M210 430 C204 428 200 432 202 436 C205 434 209 431 210 430"/>
    <path d="M210 430 C216 428 220 432 218 436 C215 434 211 431 210 430"/>
