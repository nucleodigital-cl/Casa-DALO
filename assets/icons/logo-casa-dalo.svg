  <!-- Text block -->
  <text class="title" x="210" y="330" font-size="34" text-anchor="middle">CASA DALO</text>
  <text class="subtitle" x="210" y="362" font-size="15" text-anchor="middle">DEL AMOR Y OTRAS LECTURAS</text>

  <!-- Divider with star -->
  <g class="gold" stroke-width="1">
