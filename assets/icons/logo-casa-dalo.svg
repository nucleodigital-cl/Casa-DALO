<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 460" role="img" aria-label="CASA DALO — Del Amor y Otras Lecturas. Libros artesanales para quienes leen con el corazón.">
  <defs>
    <style type="text/css"><![CDATA[
      .gold { fill: none; stroke: #B78C42; stroke-linecap: round; stroke-linejoin: round; }
      .gold-fill { fill: #B78C42; stroke: none; }
      .title { fill: #5B1E2D; font-family: "Cormorant Garamond", "Times New Roman", Georgia, serif; font-weight: 600; letter-spacing: 0.18em; }
      .subtitle { fill: #5B1E2D; font-family: "Cormorant Garamond", "Times New Roman", Georgia, serif; font-weight: 500; letter-spacing: 0.22em; }
      .tagline { fill: #B78C42; font-family: Lora, Georgia, serif; font-style: italic; font-weight: 400; }
    ]]></style>
  </defs>

