<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#163828"/>
      <stop offset="60%" stop-color="#0A1D13"/>
      <stop offset="100%" stop-color="#050F0A"/>
    </radialGradient>

    <!-- Metallic Gold Gradient Primary -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE8A6"/>
      <stop offset="25%" stop-color="#E2B857"/>
      <stop offset="50%" stop-color="#C59329"/>
      <stop offset="75%" stop-color="#F3DA8E"/>
      <stop offset="100%" stop-color="#A27318"/>
    </linearGradient>

    <!-- Metallic Gold Accent -->
    <linearGradient id="gold-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BA8823"/>
      <stop offset="50%" stop-color="#FDF1B8"/>
      <stop offset="100%" stop-color="#DCAE46"/>
    </linearGradient>

    <!-- Subtle Inner Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&amp;family=Montserrat:wght@300;400&amp;display=swap');

      .brand-title {
        font-family: 'Cinzel', 'Trajan Pro', 'Georgia', serif;
        font-weight: 700;
        font-size: 42px;
        fill: url(#gold-grad);
        letter-spacing: 7px;
        text-anchor: middle;
      }

      .brand-subtitle {
        font-family: 'Cormorant Garamond', 'Garamond', 'Georgia', serif;
        font-weight: 600;
        font-size: 20px;
        fill: #E3C377;
        letter-spacing: 5px;
        text-anchor: middle;
        text-transform: uppercase;
      }

      .brand-tagline {
        font-family: 'Cormorant Garamond', 'Garamond', 'Georgia', serif;
        font-style: italic;
        font-size: 17px;
        fill: #D1C5A5;
        letter-spacing: 1.5px;
        text-anchor: middle;
      }

      .line-accent {
        stroke: url(#gold-grad);
        stroke-width: 1.5;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="24" fill="url(#bg-grad)"/>

  <!-- Outer Ornate Frame -->
  <rect x="35" y="35" width="730" height="730" rx="16" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.85"/>
  <rect x="45" y="45" width="710" height="710" rx="12" fill="none" stroke="url(#gold-light)" stroke-width="1" opacity="0.4" stroke-dasharray="8 4"/>

  <!-- Corner Filigree Ornaments -->
  <!-- Top-Left -->
  <g transform="translate(55, 55)">
    <path d="M0,0 L35,0 C20,0 0,20 0,35 Z" fill="url(#gold-grad)"/>
    <path d="M12,12 Q25,12 25,25 Q12,25 12,12 Z" fill="none" stroke="url(#gold-light)" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2.5" fill="url(#gold-light)"/>
  </g>
  <!-- Top-Right -->
  <g transform="translate(745, 55) scale(-1, 1)">
    <path d="M0,0 L35,0 C20,0 0,20 0,35 Z" fill="url(#gold-grad)"/>
    <path d="M12,12 Q25,12 25,25 Q12,25 12,12 Z" fill="none" stroke="url(#gold-light)" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2.5" fill="url(#gold-light)"/>
  </g>
  <!-- Bottom-Left -->
  <g transform="translate(55, 745) scale(1, -1)">
    <path d="M0,0 L35,0 C20,0 0,20 0,35 Z" fill="url(#gold-grad)"/>
    <path d="M12,12 Q25,12 25,25 Q12,25 12,12 Z" fill="none" stroke="url(#gold-light)" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2.5" fill="url(#gold-light)"/>
  </g>
  <!-- Bottom-Right -->
  <g transform="translate(745, 745) scale(-1, -1)">
    <path d="M0,0 L35,0 C20,0 0,20 0,35 Z" fill="url(#gold-grad)"/>
    <path d="M12,12 Q25,12 25,25 Q12,25 12,12 Z" fill="none" stroke="url(#gold-light)" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2.5" fill="url(#gold-light)"/>
  </g>

  <!-- Central Arch Frame -->
  <path d="M 220 370 A 180 180 0 0 1 580 370 L 580 400 L 220 400 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- ================= EMBLEM ARTWORK ================= -->
  <g transform="translate(400, 260)">
    
    <!-- Magical Aura / Stars Background -->
    <g opacity="0.8">
      <!-- Fairytale Sparkles -->
      <path d="M 0 -130 L 3 -115 L 18 -112 L 3 -109 L 0 -94 L -3 -109 L -18 -112 L -3 -115 Z" fill="url(#gold-light)"/>
      <path d="M -110 -60 L -108 -50 L -98 -48 L -108 -46 L -110 -36 L -112 -46 L -122 -48 L -112 -50 Z" fill="url(#gold-light)" transform="scale(0.7)"/>
      <path d="M 140 -50 L 142 -42 L 150 -40 L 142 -38 L 140 -30 L 138 -38 L 130 -40 L 138 -42 Z" fill="url(#gold-light)" transform="scale(0.75)"/>
      <circle cx="-70" cy="-100" r="2" fill="#FFF2C6"/>
      <circle cx="80" cy="-95" r="2.5" fill="#FFF2C6"/>
      <circle cx="-130" cy="10" r="1.5" fill="#FFF2C6"/>
      <circle cx="125" cy="20" r="1.5" fill="#FFF2C6"/>
    </g>

    <!-- Arch Crown / Tiara Ornament -->
    <path d="M -60 -115 C -30 -135 30 -135 60 -115 Q 30 -125 0 -120 Q -30 -125 -60 -115 Z" fill="url(#gold-grad)"/>
    <circle cx="0" cy="-132" r="5" fill="url(#gold-light)"/>
    <circle cx="-32" cy="-126" r="3.5" fill="url(#gold-light)"/>
    <circle cx="32" cy="-126" r="3.5" fill="url(#gold-light)"/>

    <!-- Open Enchanted Book Base -->
    <!-- Left Cover -->
    <path d="M 0 55 C -40 45 -110 35 -160 50 L -160 65 C -110 50 -40 60 0 72 Z" fill="url(#gold-grad)" opacity="0.9"/>
    <!-- Right Cover -->
    <path d="M 0 55 C 40 45 110 35 160 50 L 160 65 C 110 50 40 60 0 72 Z" fill="url(#gold-grad)" opacity="0.9"/>

    <!-- Pages Fanning Out -->
    <!-- Back Pages Left -->
    <path d="M 0 45 C -45 32 -110 22 -155 35 L -155 48 C -105 35 -40 43 0 55 Z" fill="#E8D196" opacity="0.4"/>
    <!-- Back Pages Right -->
    <path d="M 0 45 C 45 32 110 22 155 35 L 155 48 C 105 35 40 43 0 55 Z" fill="#E8D196" opacity="0.4"/>

    <!-- Main Open Pages Left -->
    <path d="M -2 46 C -40 28 -105 20 -150 32 L -150 44 C -105 32 -40 40 -2 54 Z" fill="url(#gold-light)"/>
    <!-- Main Open Pages Right -->
    <path d="M 2 46 C 40 28 105 20 150 32 L 150 44 C 105 32 40 40 2 54 Z" fill="url(#gold-light)"/>

    <!-- Book Spine Rib Ribbon -->
    <path d="M -3 48 L -3 95 C -3 98 3 98 3 95 L 3 48 Z" fill="url(#gold-grad)"/>

    <!-- Emerging Heart & Vines (Del Amor) -->
    <!-- Central Sacred Heart Silhouette with Book Spine -->
    <g transform="translate(0, -25)">
      <!-- Radiant Rays behind heart -->
      <g stroke="url(#gold-light)" stroke-width="1" opacity="0.35">
        <line x1="0" y1="0" x2="0" y2="-55"/>
        <line x1="0" y1="0" x2="-35" y2="-40"/>
        <line x1="0" y1="0" x2="35" y2="-40"/>
        <line x1="0" y1="0" x2="-50" y2="-15"/>
        <line x1="0" y1="0" x2="50" y2="-15"/>
        <line x1="0" y1="0" x2="-45" y2="20"/>
        <line x1="0" y1="0" x2="45" y2="20"/>
      </g>

      <!-- Heart Path -->
      <path d="M 0 32 C -45 -5 -40 -48 0 -22 C 40 -48 45 -5 0 32 Z" 
            fill="none" stroke="url(#gold-grad)" stroke-width="3.5" filter="url(#glow)"/>
      <path d="M 0 26 C -37 -5 -33 -40 0 -18 C 33 -40 37 -5 0 26 Z" 
            fill="url(#gold-light)" opacity="0.25"/>

      <!-- Inner Keyhole inside heart -->
      <circle cx="0" cy="-6" r="5" fill="url(#gold-grad)"/>
      <polygon points="-3,-6 3,-6 5,10 -5,10" fill="url(#gold-grad)"/>

      <!-- Delicate Botanical Vines & Leaves entwining around Heart -->
      <!-- Left Vine -->
      <path d="M -32 5 Q -50 -20 -22 -35 Q -8 -42 -2 -24" fill="none" stroke="url(#gold-light)" stroke-width="1.8"/>
      <path d="M -42 -10 C -48 -14 -46 -22 -38 -18 C -35 -14 -38 -10 -42 -10 Z" fill="url(#gold-grad)"/>
      <path d="M -28 -30 C -34 -34 -30 -40 -24 -36 C -22 -31 -25 -28 -28 -30 Z" fill="url(#gold-grad)"/>
      
      <!-- Right Vine -->
      <path d="M 32 5 Q 50 -20 22 -35 Q 8 -42 2 -24" fill="none" stroke="url(#gold-light)" stroke-width="1.8"/>
      <path d="M 42 -10 C 48 -14 46 -22 38 -18 C 35 -14 38 -10 42 -10 Z" fill="url(#gold-grad)"/>
      <path d="M 28 -30 C 34 -34 30 -40 24 -36 C 22 -31 25 -28 28 -30 Z" fill="url(#gold-grad)"/>

      <!-- Small Rose Bud on top of heart -->
      <circle cx="0" cy="-28" r="4" fill="url(#gold-light)"/>
      <path d="M -5 -28 Q 0 -35 5 -28 Q 0 -23 -5 -28 Z" fill="url(#gold-grad)"/>
    </g>

    <!-- Quill Feather diagonal accent across book bottom -->
    <g transform="translate(0, 52) rotate(-18)">
      <path d="M -70 0 C -30 -12 20 -15 80 -8 C 30 -2 -20 2 -70 0 Z" fill="url(#gold-grad)"/>
      <path d="M -70 0 L 88 -7" stroke="url(#gold-light)" stroke-width="1"/>
    </g>

  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  
  <!-- Divider Line Top -->
  <g transform="translate(400, 485)">
    <line x1="-180" y1="0" x2="180" y2="0" class="line-accent"/>
    <polygon points="0,-6 8,0 0,6 -8,0" fill="url(#gold-grad)"/>
    <circle cx="-180" cy="0" r="3" fill="url(#gold-grad)"/>
    <circle cx="180" cy="0" r="3" fill="url(#gold-grad)"/>
  </g>

  <!-- Brand Name Primary -->
  <text x="400" y="545" class="brand-title">CASA DALO</text>

  <!-- Brand Subtitle -->
  <text x="400" y="590" class="brand-subtitle">DEL AMOR Y OTRAS LECTURAS</text>

  <!-- Ornament Line Bottom -->
  <g transform="translate(400, 620)">
    <path d="M -120 0 C -60 -8 -20 -8 0 0 C 20 -8 60 -8 120 0" fill="none" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <circle cx="0" cy="-4" r="2.5" fill="url(#gold-light)"/>
    <circle cx="-50" cy="-4" r="1.8" fill="url(#gold-light)"/>
    <circle cx="50" cy="-4" r="1.8" fill="url(#gold-light)"/>
  </g>

  <!-- Brand Tagline -->
  <text x="400" y="662" class="brand-tagline">“Libros artesanales para quienes leen con el corazón”</text>

  <!-- Small Footer Emblem Symbol -->
  <g transform="translate(400, 705)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="url(#gold-light)"/>
  </g>

</svg>
